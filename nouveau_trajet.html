{% extends 'base.html' %}
{% block title %}Nouveau trajet{% endblock %}
{% block page_title %}Nouveau trajet{% endblock %}

{% block content %}
<div class="row justify-content-center">
<div class="col-lg-8">
<div class="panel">
    <div class="panel-header"><h5><i class="fas fa-route text-primary"></i> Informations du trajet</h5></div>
    <div class="panel-body">
        <form method="POST" class="form-modern">
            <div class="row g-3">
                <div class="col-md-6">
                    <label><i class="fas fa-location-dot"></i> Ville de départ *</label>
                    <input type="text" name="ville_depart" required placeholder="Ex: Dakar">
                </div>
                <div class="col-md-6">
                    <label><i class="fas fa-flag-checkered"></i> Ville d'arrivée *</label>
                    <input type="text" name="ville_arrivee" required placeholder="Ex: Saint-Louis">
                </div>
                <div class="col-md-6">
                    <label><i class="fas fa-calendar"></i> Date de départ *</label>
                    <input type="date" name="date_depart" required>
                </div>
                <div class="col-md-6">
                    <label><i class="fas fa-clock"></i> Heure de départ *</label>
                    <input type="time" name="heure_depart" required>
                </div>
                <div class="col-md-6">
                    <label><i class="fas fa-tag"></i> Prix (FCFA) *</label>
                    <input type="number" name="prix" step="0.01" required placeholder="Ex: 5000">
                </div>
                <div class="col-md-6">
                    <label><i class="fas fa-chair"></i> Capacité totale *</label>
                    <input type="number" name="capacite_totale" required placeholder="Ex: 30">
                </div>
                <div class="col-md-12">
                    <label><i class="fas fa-bus"></i> Bus assigné</label>
                    <select name="bus_id">
                        <option value="">-- Aucun --</option>
                        {% for b in bus %}
                        <option value="{{ b.id }}">{{ b.immatriculation }} - {{ b.modele }} ({{ b.capacite }} places)</option>
                        {% endfor %}
                    </select>
                </div>
            </div>
            <div class="d-flex gap-2 mt-4">
                <button class="btn-modern btn-primary-m"><i class="fas fa-floppy-disk"></i> Créer le trajet</button>
                <a href="{{ url_for('trajets') }}" class="btn-modern btn-light-m">Annuler</a>
            </div>
        </form>
    </div>
</div>
</div>
</div>
{% endblock %}
