<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Gestion des Places{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
</head>
<body>

<nav class="navbar">
  <a href="{{ url_for('views.index') }}" class="nav-logo">
    <span class="nav-logo-icon">▣</span>
    <span>GestionPlaces</span>
  </a>
  <div class="nav-links">
    <a href="{{ url_for('views.index') }}" class="nav-link {% if request.endpoint == 'views.index' %}active{% endif %}">
      Tableau de bord
    </a>
    <a href="{{ url_for('views.index') }}#bus-list" class="nav-link">Bus</a>
  </div>
</nav>

<main class="main-content">
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for cat, msg in messages %}
      <div class="flash flash-{{ cat }}">{{ msg }}</div>
    {% endfor %}
  {% endwith %}

  {% block content %}{% endblock %}
</main>

<script src="{{ url_for('static', filename='js/main.js') }}"></script>
{% block scripts %}{% endblock %}
</body>
</html>
