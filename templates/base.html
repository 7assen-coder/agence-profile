<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}TransAvis{% endblock %}</title>

    <!-- Propriétés de l'application -->
    <meta name="application-name" content="TransAvis">
    <meta name="description" content="Système de gestion des avis et notation client — Transport Mauritanie">
    <meta name="author" content="Oumar Diop, Mamoudou Sow, Med Ghoulam Meyloud">
    <meta name="version" content="1.0.0">
    <meta name="keywords" content="avis, transport, mauritanie, notation, feedback">

    <!-- PWA -->
    <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
    <meta name="theme-color" content="#111111">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="TransAvis">
    <link rel="apple-touch-icon" href="{{ url_for('static', filename='icons/icon-192.png') }}">

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon.svg') }}">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

    <!-- TOPBAR -->
    <header class="topbar">
        <div class="topbar-inner">
            <div class="brand">
                <div class="brand-icon">
                    <svg width="22" height="22" viewBox="0 0 680 680" xmlns="http://www.w3.org/2000/svg">
                        <rect x="130" y="280" width="420" height="190" rx="18" fill="#111111"/>
                        <rect x="145" y="295" width="90" height="80" rx="8" fill="#ffffff"/>
                        <rect x="255" y="295" width="70" height="60" rx="6" fill="#ffffff"/>
                        <rect x="340" y="295" width="70" height="60" rx="6" fill="#ffffff"/>
                        <rect x="425" y="295" width="70" height="60" rx="6" fill="#ffffff"/>
                        <circle cx="220" cy="475" r="42" fill="#111111"/>
                        <circle cx="220" cy="475" r="20" fill="#ffffff"/>
                        <circle cx="460" cy="475" r="42" fill="#111111"/>
                        <circle cx="460" cy="475" r="20" fill="#ffffff"/>
                        <circle cx="470" cy="200" r="60" fill="#111111"/>
                        <path d="M470,155 L480,183 L510,183 L487,200 L496,228 L470,211 L444,228 L453,200 L430,183 L460,183 Z" fill="#ffffff"/>
                    </svg>
                </div>
                <span class="brand-name">Trans<span class="accent">Avis</span></span>
            </div>
            <nav class="topnav">
                <a href="/" class="nav-link {% if request.path == '/' %}active{% endif %}">Accueil</a>
                <a href="/trajets" class="nav-link {% if request.path == '/trajets' %}active{% endif %}">Trajets</a>
                <a href="/feedbacks" class="nav-link {% if request.path == '/feedbacks' %}active{% endif %}">Avis</a>
                <a href="/statistiques" class="nav-link {% if request.path == '/statistiques' %}active{% endif %}">Statistiques</a>
            </nav>
        </div>
    </header>

    <!-- CONTENU -->
    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <span>© 2026 TransAvis · Oumar Diop · Mamoudou Sow · Med Ghoulam Meyloud — ESP Nouakchott</span>
    </footer>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    {% block scripts %}{% endblock %}

    <!-- Service Worker PWA -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/static/sw.js')
                    .then(r => console.log('TransAvis PWA prête'))
                    .catch(e => console.log('SW erreur:', e));
            });
        }
    </script>
</body>
</html>
